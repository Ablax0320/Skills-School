<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills School | IT Mutaxassislik Markazi</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- CSS fayl -->
    <link rel="stylesheet" href="dizayn.css">
</head>
<body>

    <!-- 3D Canvas Container -->
    <div id="canvas-container"></div>

    <!-- Asosiy kontent -->
    <div class="content">
        <!-- LOGOTIP (chap yuqori) -->
        <div class="logo">
            <div class="logo-icon">
                <img src="Screenshot From 2026-05-13 23-48-25.png" alt="Skills School Logo" id="logo-img">
            </div>
            <div class="logo-text">Skills<span>School</span></div>
        </div>

        <!-- MARKAZIY TITLE -->
        <div class="center-title">
            <h1 class="main-title">SKILLS SCHOOL</h1>
            <p class="subtitle">IT MUTAXASSISLIK MARKAZI</p>
            <div class="typing-text">
                <span id="typed-text"></span><span class="cursor">|</span>
            </div>
        </div>

        <!-- SIZNING RASMINGIZ (o'ng pastki) -->
        <div class="owner-section">
            <div class="owner-image">
                <img src="Screenshot From 2026-05-13 23-50-26.png" alt="Musulmonov Mamarajab" id="owner-img">
            </div>
            <div class="owner-info">
                <div class="owner-name">Musulmonov Mamarajab</div>
                <div class="owner-title">Founder & CEO</div>
            </div>
        </div>

        <!-- Scroll indikatori -->
        <div class="scroll-indicator" onclick="scrollToNext()">
            <span>scroll</span>
            <i class="fas fa-chevron-down"></i>
        </div>
    </div>

    <!-- Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <!-- JavaScript fayl -->
    <script type="module" src="javas.js"></script>
    
    <!-- Qo'shimcha vanilla JS -->
    <script>
        // Typing effekti
        const words = [
            "Cybersecurity",
            "Software Engineering",
            "Data Science",
            "Web Development",
            "Python Programming",
            "AI & Machine Learning"
        ];
        
        let wordIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        const typedTextSpan = document.getElementById('typed-text');
        
        function typeEffect() {
            const currentWord = words[wordIndex];
            
            if (isDeleting) {
                typedTextSpan.textContent = currentWord.substring(0, charIndex - 1);
                charIndex--;
            } else {
                typedTextSpan.textContent = currentWord.substring(0, charIndex + 1);
                charIndex++;
            }
            
            if (!isDeleting && charIndex === currentWord.length) {
                isDeleting = true;
                setTimeout(typeEffect, 2000);
                return;
            }
            
            if (isDeleting && charIndex === 0) {
                isDeleting = false;
                wordIndex = (wordIndex + 1) % words.length;
                setTimeout(typeEffect, 500);
                return;
            }
            
            const speed = isDeleting ? 50 : 100;
            setTimeout(typeEffect, speed);
        }
        
        typeEffect();
        
        // Scroll funksiyasi
        function scrollToNext() {
            window.scrollTo({
                top: window.innerHeight,
                behavior: 'smooth'
            });
        }
    </script>
</body>
</html>
